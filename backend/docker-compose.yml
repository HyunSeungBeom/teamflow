version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
      POSTGRES_DB: teamflow
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: teamflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
